services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped
  mlflow:
    image: python:3.11-slim
    working_dir: /mlflow
    environment:
      MLFLOW_BACKEND_STORE_URI: ${MLFLOW_BACKEND_STORE_URI}
      MLFLOW_ARTIFACT_ROOT: ${MLFLOW_ARTIFACT_ROOT}
    command: >
      bash -lc "pip install --no-cache-dir mlflow &&
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri ${MLFLOW_BACKEND_STORE_URI}
      --default-artifact-root ${MLFLOW_ARTIFACT_ROOT}"
    volumes:
      - mlflow-data:/mlflow
    ports:
      - "5000:5000"
    restart: unless-stopped
  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
    command: >
      bash -lc "airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_ADMIN_USERNAME:-admin}
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com
      --password ${AIRFLOW_ADMIN_PASSWORD:-admin} || true"
    depends_on:
      postgres:
        condition: service_healthy
  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      AIRFLOW__WEBSERVER__WEB_SERVER_PORT: 8080
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
    command: webserver
    volumes:
      - ./dags:/opt/airflow/project/dags
      - ./src:/opt/airflow/project/src
      - ./scripts:/opt/airflow/project/scripts
      - ./runs:/opt/airflow/project/runs
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_started
    restart: unless-stopped
  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    hostname: airflow-scheduler
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__HOSTNAME_CALLABLE: socket.gethostname
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/project/dags
      - ./src:/opt/airflow/project/src
      - ./scripts:/opt/airflow/project/scripts
      - ./runs:/opt/airflow/project/runs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_started
    restart: unless-stopped
volumes:
  postgres-db-volume:
  mlflow-data:
